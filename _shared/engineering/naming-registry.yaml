# Sunfish naming registry — hand-curated reservations + rejections
#
# This file is consulted by tools/naming/check.py to flag collisions with
# names that aren't visible from the filesystem alone (reserved tentative
# numbers, rejected-during-brainstorm names, locked vocabulary).
#
# Filesystem-derivable names (existing packages, namespaces, ADR numbers,
# amendment IDs) are scanned automatically by check.py — don't duplicate
# them here unless they need annotation.
#
# Update this file when:
#  - A new ADR or intake claims a tentative number (`~ADR XXXX`)
#  - A naming brainstorm rejects candidates (record reason)
#  - A vocabulary term is locked (Wayfinder, Mission Space, etc.)
#  - A cluster convention is established (`blocks-property-*`)

# === Reserved tentative ADR numbers ===
# These ADRs have intake stubs filed but the ADR itself is not yet authored.
# When authoring a new ADR, do NOT use these numbers — they are claimed.
#
# Note: ADR 0066 was reserved here for Helm + Identity Atlas (intake 2026-05-01)
# and is now actively in flight via PR #529 — moved out of "reserved_adrs" list.
# A parallel ONR session attempted ADR 0066 on 2026-05-04 for Crew Comms; that
# work was renumbered to 0076 per CO directive (first-claim discipline). The
# 0076 entry below preserves the reservation against future collisions.
reserved_adrs:
  - number: 67
    title: "Atlas Integration-Config"
    intake: icm/00_intake/output/2026-05-01_atlas-integration-config-intake.md
    reserver: W#34 follow-on
  - number: 68
    title: "Tenant Security Policy"
    intake: icm/00_intake/output/2026-05-01_tenant-security-policy-intake.md
    reserver: W#34 follow-on (W#37; needs general counsel)
  - number: 76
    title: "Crew Comms — foundation-channels Contracts and Native Implementation"
