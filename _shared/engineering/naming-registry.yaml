# === Locked Sunfish vocabulary ===
# Canonical names with established meanings. Don't reuse for unrelated concepts.
locked_vocabulary:
  Wayfinder:
    definition: "The configuration system (umbrella term). Per ADR 0065."
    composes: [Helm, Atlas, "Standing Order"]
  Helm:
    definition: "Live-state pane within Wayfinder. Per W#34 brainstorm 2026-05-01."
  Atlas:
    definition: "Deep-config user-facing UI within Wayfinder. Per ADR 0065."
  Standing Order:
    definition: "Internal config-change record / event type within Wayfinder. Per ADR 0065 + 0028."
  Mission Space:
    definition: "Capability-dimensions framework. Per W#33 + ADR 0062. NOT 'Capability Matrix' (5-way collision)."
  Mission Envelope:
    definition: "Per-context capability snapshot. Per ADR 0062."
  Anchor:
    definition: "Zone A local-first desktop accelerator. Per ADR 0032."
  Bridge:
    definition: "Zone C hybrid hosted-node-as-SaaS accelerator. Per ADR 0031."
    note: "Reserved as accelerator name; do NOT reuse for unrelated 'bridge' concepts."
  Quarterdeck:
    definition: "Entry-point location in Ship Architecture. Per W#35."
  Engine Room:
    definition: "Operations + observability location in Ship Architecture. Per W#35."
  Tactical:
    definition: "Anomaly-detection location in Ship Architecture. Per W#35."
  Sick Bay:
    definition: "Aggregation + diagnostics location in Ship Architecture. Per W#35."
  Ship's Office:
    definition: "Scribe / content location in Ship Architecture. Per W#35."

