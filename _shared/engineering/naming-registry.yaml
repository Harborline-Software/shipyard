# === Cluster naming conventions ===
# Established prefix patterns for related package families.
cluster_conventions:
  - cluster: "Property operations cluster"
    prefix: "blocks-property-*"
    example_packages: [blocks-property-assets, blocks-property-receipts, blocks-property-equipment]
    note: "Established 2026-04-28 after W#24 collision with existing UI-only blocks-assets package."
  - cluster: "Foundation packages"
    prefix: "foundation-*"
    namespace: "Sunfish.Foundation.*"
    note: "Framework-agnostic contracts."
  - cluster: "Kernel packages"
    prefix: "kernel-*"
    namespace: "Sunfish.Kernel.*"
    note: "Runtime substrates."
  - cluster: "UI adapter packages"
    prefix: "ui-adapters-*"
    examples: [ui-adapters-blazor, ui-adapters-react]
  - cluster: "Compat packages"
    prefix: "compat-*"
    namespace: "Sunfish.Compat.*"
    note: "Vendor-compatibility layers (Telerik, Syncfusion, etc.)."
  - cluster: "Bridge subscription"
    prefix: "Sunfish.Bridge.*"
    note: "Bridge-side packages."

# === ADR amendment numbering note ===
# Amendment IDs are simple integers (A1, A2, ...) — gap-free per ADR.
# When proposing an amendment, run: grep -E "^## Amendment A\d+" docs/adrs/NNNN-*.md
# to find the highest existing amendment number; next available is N+1.
# Example: ADR 0028 has A1-A11 (verified 2026-05-04); next available is A12.
