name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/global.json"
      - "**/Directory.Packages.props"
      - "**/Directory.Build.props"
      - "**/Directory.Build.targets"
  pull_request:
    branches: [main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/global.json"
      - "**/Directory.Packages.props"
      - "**/Directory.Build.props"
      - "**/Directory.Build.targets"
  schedule:
    # Weekly scan every Monday at 04:30 UTC
    - cron: "30 4 * * 1"

# Only runs when C# source or project configuration changes. PRs that touch
# only docs, ADRs, or TypeScript skip this job. The weekly cron still covers
# all code unconditionally.

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Build
        run: dotnet build packages/foundation/Sunfish.Foundation.csproj

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:csharp
