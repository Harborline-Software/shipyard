name: CI

on:
  pull_request:
    branches: [main]
    # Build & Test runs on EVERY pull_request — the prior paths-ignore filter
    # caused required-check stalls on docs-only PRs (workflow never triggered,
    # required check never reported, PR stuck BLOCKED). Per Admiral directive
    # 2026-05-19T06-50Z + CIC's earlier ruling on flight-deck's equivalent
    # issue: remove the filter. Docs-only PRs pay ~3-5 min of dotnet restore +
    # build (cheap; acceptable trade vs. the stall trap).
  push:
    branches: [main]

# Public-repo hardening: pure CI (build/test) needs only read access to checkout
# the repo and upload-artifact. No write surface anywhere.
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    # Shipyard.slnx contains only the platform packages + apps/docs +
    # apps/kitchen-sink + apps/local-node-host (all pure net11.0). The Anchor
    # MAUI accelerator + Bridge accelerator moved out of shipyard to sunfish/
    # and signal-bridge/ in the 2026-05-17 multi-repo restructure, so shipyard's
    # CI can run on ubuntu-latest (was: windows-latest under the legacy slnx
    # which carried the MAUI project). Anchor's MAUI build is now gated by
    # sunfish/.github/workflows/ci.yml on windows-latest.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Shipyard.slnx

      - name: Build
        run: dotnet build Shipyard.slnx --no-restore

      # Integration-tier tests need infrastructure the runner image doesn't
      # ship (Testcontainers + Docker + postgres / IPFS / RabbitMQ; Playwright
      # browsers for a11y tests). Filter them out of the PR-blocking unit-test
      # run. Tests still BUILD and are still discovered; only execution is
      # filtered.
      - name: Test (unit-tier)
        run: |
          dotnet test Shipyard.slnx --no-build \
            --filter "FullyQualifiedName!~Postgres.Tests&FullyQualifiedName!~BlobReplication.Tests&FullyQualifiedName!~A11y.Tests&FullyQualifiedName!~Tests.Integration" \
            --logger "trx" \
            --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/
