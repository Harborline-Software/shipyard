name: Ledger render check

on:
  pull_request:
    branches: [main]
    paths:
      - 'icm/_state/active-workstreams.md'
      - 'icm/_state/workstreams/**'
      - 'tools/icm/**'
      - '.github/workflows/ledger-check.yml'

# Read-only check; verifies that the committed icm/_state/active-workstreams.md
# matches the regen output of the ledger renderer. Catches direct hand-edits
# to the generated ledger (the per-workstream files under
# icm/_state/workstreams/W*.md are the source of truth).
#
# Post-2026-05-17 restructure: the legacy renderer lived at
# tools/icm/render-ledger.py in SunfishSoftware/Sunfish/. The new shipyard/
# layout does not yet have a tools/ directory; the renderer is expected to be
# ported there in a follow-on workstream. Until then this workflow guards on
# the script's existence and reports a soft skip rather than failing every PR.
permissions:
  contents: read

jobs:
  check:
    name: Verify ledger regen matches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run ledger renderer if available
        run: |
          if [ -x tools/icm/render-ledger.py ] || [ -f tools/icm/render-ledger.py ]; then
            python3 tools/icm/render-ledger.py --check
          else
            echo "::notice::tools/icm/render-ledger.py not yet ported to shipyard; skipping ledger render check."
            echo "Once the script is ported (post-multi-repo-restructure follow-on), this gate runs automatically."
          fi
