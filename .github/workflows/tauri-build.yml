# ---------------------------------------------------------------------------
# Tauri cross-platform build — INERT in shipyard (preserved per CIC directive
# 2026-05-17: "don't move/delete shipyard workflows" during the fleet
# restructure).
#
# The Tauri shell moved to sunfish/apps/desktop/ in the 2026-05-17 multi-repo
# restructure; the live tauri-build workflow now lives at
# `sunfish/.github/workflows/tauri-build.yml`. This file's path triggers
# (apps/anchor-tauri/**) cannot match in shipyard because that directory does
# not exist here — the workflow stays defined as a placeholder but never fires.
# ---------------------------------------------------------------------------

name: Tauri cross-platform build

# Path globs intentionally point at directories that don't exist in shipyard
# post-restructure; the workflow therefore never triggers. See header above.
on:
  push:
    paths:
      - 'apps/anchor-tauri/**'
      - '.github/workflows/tauri-build.yml.disabled'
  pull_request:
    paths:
      - 'apps/anchor-tauri/**'
      - '.github/workflows/tauri-build.yml.disabled'

permissions:
  contents: read

jobs:
  inert:
    name: Tauri cross-platform build (relocated to sunfish/)
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Tauri cross-platform build lives in"
          echo "sunfish/.github/workflows/tauri-build.yml post-2026-05-17"
          echo "multi-repo restructure. This shipyard-side workflow is"
          echo "preserved as a placeholder and does not run."
