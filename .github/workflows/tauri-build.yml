name: Tauri cross-platform build

on:
  push:
    paths:
      - 'apps/anchor-tauri/**'
      - '.github/workflows/tauri-build.yml'
  pull_request:
    paths:
      - 'apps/anchor-tauri/**'
      - '.github/workflows/tauri-build.yml'

concurrency:
  group: tauri-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - os: macos-13
            target: x86_64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundle: msi
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: appimage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/anchor-tauri/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/anchor-tauri/src-tauri

      - name: Refresh Rust toolchain after cache restore
        run: rustup update stable --no-self-update && rustup target add ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build @sunfish/ui-react
        run: npm install && npm run build
        working-directory: packages/ui-react

      - name: Install npm dependencies
        run: npm ci
        working-directory: apps/anchor-tauri

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}
        working-directory: apps/anchor-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: anchor-tauri-${{ matrix.target }}
          path: |
            apps/anchor-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle }}/*
          retention-days: 14
